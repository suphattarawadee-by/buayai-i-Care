<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบลงทะเบียน E-Point - โรงเรียนบัวใหญ่</title>
    
    <!-- Bootstrap 5 & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --orange-main: #f97316; /* สีส้มวัยรุ่น */
            --orange-dark: #ea580c;
            --orange-light: #ffedd5;
            --bg-color: #fff7ed;
        }

        body { font-family: 'Sarabun', sans-serif; background-color: var(--bg-color); color: #1e293b; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        
        .main-card { background: white; border-radius: 25px; padding: 40px 30px; width: 100%; max-width: 450px; box-shadow: 0 20px 40px rgba(234, 88, 12, 0.1); border: 1px solid var(--orange-light); position: relative; overflow: hidden; }
        
        /* ขีดสีส้มตกแต่งด้านบนการ์ด */
        .main-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 8px; background: linear-gradient(90deg, #f59e0b, #f97316, #ea580c); }

        .form-control, .form-select { border-radius: 15px; padding: 12px 20px; border: 1px solid #cbd5e1; background-color: #f8fafc; font-weight: 500; }
        .form-control:focus, .form-select:focus { border-color: var(--orange-main); box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.15); background-color: white; }
        
        .btn-orange { background: linear-gradient(135deg, var(--orange-main), var(--orange-dark)); color: white; border: none; border-radius: 15px; padding: 14px; font-weight: 700; font-size: 1.1rem; transition: 0.3s; }
        .btn-orange:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(234, 88, 12, 0.3); color: white; }
        .btn-orange:disabled { background: #cbd5e1; transform: none; box-shadow: none; }

        .btn-link-orange { color: var(--orange-dark); font-weight: 600; text-decoration: none; transition: 0.2s; cursor: pointer; }
        .btn-link-orange:hover { color: #c2410c; text-decoration: underline; }

        .logo-img { width: 90px; height: 90px; object-fit: contain; border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 15px; background: white; padding: 5px; }

        .mode-title { font-weight: 800; color: var(--orange-dark); margin-bottom: 5px; letter-spacing: -0.5px; }
    </style>
</head>
<body>

    <div class="main-card text-center">
        <!-- Logo -->
        <img src="https://drive.google.com/thumbnail?id=15qRbrNRtzKrqwii83OBc8AtVywopEMlj&sz=w200" alt="Logo" class="logo-img">
        
        <div id="view-register">
            <h3 class="mode-title">สมัครใช้งานระบบคะแนนพฤติกรรม E-Point</h3>
            <p class="text-muted small mb-4">ระบบดูแลช่วยเหลือผู้เรียนดิจิทัล Buayai I care school</p>

            <div class="text-start mb-3">
                <label class="small fw-bold mb-1 text-muted">1. เลือกระดับชั้น</label>
                <!-- รายชื่อ 60 ห้องจะถูกสร้างอัตโนมัติตอนเปิดเว็บ -->
                <select id="reg-room" class="form-select" onchange="loadStudents('reg')">
                    <option value="">-- เลือกห้องเรียน --</option>
                </select>
            </div>

            <div class="text-start mb-3">
                <label class="small fw-bold mb-1 text-muted">2. เลือกชื่อ-สกุล</label>
                <select id="reg-student" class="form-select" disabled onchange="fillStudentId('reg')">
                    <option value="">-- โปรดเลือกห้องก่อน --</option>
                </select>
            </div>

            <div class="text-start mb-3">
                <label class="small fw-bold mb-1 text-muted">รหัสประจำตัว (Auto)</label>
                <input type="text" id="reg-id" class="form-control text-primary fw-bold bg-light" readonly placeholder="รหัสนักเรียน">
            </div>

            <div class="text-start mb-3">
                <label class="small fw-bold mb-1 text-muted">3. ตั้งรหัสผ่าน (ตัวเลข 5 หลักเท่านั้น)</label>
                <input type="text" id="reg-pass" class="form-control text-center fw-bold" placeholder="เช่น 12345" maxlength="5" inputmode="numeric" oninput="this.value = this.value.replace(/[^0-9]/g, '');">
            </div>

            <div class="text-start mb-4">
                <label class="small fw-bold mb-1 text-muted">4. รหัสกันลืม (วันเดือนปีเกิด 8 หลัก)</label>
                <input type="text" id="reg-recovery" class="form-control text-center fw-bold" placeholder="เช่น 30052537" maxlength="8" inputmode="numeric" oninput="this.value = this.value.replace(/[^0-9]/g, '');">
                <div class="form-text" style="font-size: 0.75rem;">* ใช้สำหรับรีเซต หากลืมรหัสผ่าน (รูปแบบ วันเดือนปีเกิด)</div>
            </div>

            <button id="btn-submit-reg" class="btn btn-orange w-100 mb-3" onclick="submitRegister()">ลงทะเบียนเข้าใช้งาน</button>
            
            <div><a class="btn-link-orange small" onclick="switchMode('reset')"><i class="bi bi-key"></i> ลืมรหัสผ่านใช่หรือไม่? คลิกที่นี่</a></div>
        </div>

        <!-- ===================================== -->
        <!-- ส่วนลืมรหัสผ่าน (Reset Password View) -->
        <!-- ===================================== -->
        <div id="view-reset" style="display: none;">
            <h3 class="mode-title text-danger">ลืมรหัสผ่าน</h3>
            <p class="text-muted small mb-4">รีเซตด้วยตนเองผ่านวันเดือนปีเกิด</p>

            <div id="step-verify">
                <div class="text-start mb-3">
                    <label class="small fw-bold mb-1 text-muted">1. เลือกระดับชั้น</label>
                    <select id="res-room" class="form-select" onchange="loadStudents('res')">
                        <option value="">-- เลือกห้องเรียน --</option>
                    </select>
                </div>

                <div class="text-start mb-3">
                    <label class="small fw-bold mb-1 text-muted">2. เลือกชื่อ-สกุล</label>
                    <select id="res-student" class="form-select" disabled onchange="fillStudentId('res')">
                        <option value="">-- โปรดเลือกห้องก่อน --</option>
                    </select>
                    <input type="hidden" id="res-id"> <!-- ซ่อน ID ไว้ใช้ต่อ -->
                </div>

                <div class="text-start mb-4">
                    <label class="small fw-bold mb-1 text-muted">3. ยืนยันรหัสกันลืม (วันเดือนปีเกิด 8 หลักตัวเลขเท่านั้น)</label>
                    <input type="text" id="res-recovery" class="form-control text-center text-danger fw-bold" placeholder="เช่น 30052537" maxlength="8" inputmode="numeric" oninput="this.value = this.value.replace(/[^0-9]/g, '');">
                </div>

                <button id="btn-verify-reset" class="btn btn-dark w-100 mb-3 rounded-pill py-2" onclick="verifyRecovery()">ตรวจสอบข้อมูล</button>
            </div>

            <!-- โชว์เมื่อยืนยันรหัสกันลืมผ่าน -->
            <div id="step-new-pass" style="display: none; background: #f8fafc; padding: 20px; border-radius: 15px; border: 1px dashed #cbd5e1; margin-bottom: 20px;">
                <h6 class="fw-bold text-success mb-3"><i class="bi bi-check-circle-fill"></i> ยืนยันตัวตนสำเร็จ!</h6>
                
                <div class="text-start mb-2">
                    <label class="small fw-bold mb-1 text-muted">ตั้งรหัสผ่านใหม่ (ตัวเลข 5 หลัก)</label>
                    <input type="text" id="res-new-pass" class="form-control text-center text-primary fw-bold" maxlength="5" inputmode="numeric" oninput="this.value = this.value.replace(/[^0-9]/g, '');">
                </div>
                <div class="text-start mb-3">
                    <label class="small fw-bold mb-1 text-muted">ยืนยันรหัสผ่านใหม่อีกครั้ง</label>
                    <input type="text" id="res-confirm-pass" class="form-control text-center text-primary fw-bold" maxlength="5" inputmode="numeric" oninput="this.value = this.value.replace(/[^0-9]/g, '');">
                </div>

                <button id="btn-update-pass" class="btn btn-success w-100 rounded-pill py-2 fw-bold" onclick="updatePassword()">บันทึกรหัสผ่านใหม่</button>
            </div>

            <div><a class="btn-link-orange small" onclick="switchMode('register')"><i class="bi bi-arrow-left-circle"></i> กลับไปหน้าลงทะเบียน</a></div>
        </div>
    </div>

    <!-- Scripts -->
    <script>
        // =========================================================
        // ⚠️ นำลิงก์ Web App API ที่ได้จาก Google Apps Script มาใส่ตรงนี้ ⚠️
        // =========================================================
        const API_URL = "ใส่_ลิงก์_WEB_APP_ตรงนี้"; 

        // ---------------------------------------------------------
        // 🚀 1. สร้างรายชื่อห้อง ม.1/1 ถึง ม.6/10 อัตโนมัติตอนเปิดเว็บ
        // ---------------------------------------------------------
        window.addEventListener('DOMContentLoaded', () => {
            let optionsHtml = '<option value="">-- เลือกห้องเรียน --</option>';
            for (let m = 1; m <= 6; m++) {
                for (let r = 1; r <= 10; r++) {
                    // ส่งค่า (value) ไปให้ Backend เป็น "1/1" เพื่อให้ตรงกับชื่อชีตเป๊ะๆ
                    optionsHtml += `<option value="${m}/${r}">ม.${m}/${r}</option>`;
                }
            }
            document.getElementById('reg-room').innerHTML = optionsHtml;
            document.getElementById('res-room').innerHTML = optionsHtml;
        });

        // ---------------------------------------------------------
        // 🚀 2. API Fetcher กลาง (คุยกับ Google Script)
        // ---------------------------------------------------------
        async function fetchAPI(payload, btnId) {
            const btn = document.getElementById(btnId);
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> กำลังประมวลผล...';
            btn.disabled = true;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });
                return await response.json();
            } catch (error) {
                alert("⚠️ มีปัญหาการเชื่อมต่อเซิร์ฟเวอร์");
                return { error: "Connection failed" };
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        // สลับโหมด (สมัคร / ลืมรหัสผ่าน)
        function switchMode(mode) {
            document.getElementById('view-register').style.display = mode === 'register' ? 'block' : 'none';
            document.getElementById('view-reset').style.display = mode === 'reset' ? 'block' : 'none';
            document.getElementById('step-verify').style.display = 'block';
            document.getElementById('step-new-pass').style.display = 'none';
        }

        // ---------------------------------------------------------
        // 🚀 3. ดึงชื่อนักเรียนจากชีต "1/1", "1/2" ฯลฯ
        // ---------------------------------------------------------
        async function loadStudents(prefix) {
            const room = document.getElementById(`${prefix}-room`).value; // จะได้ค่าเช่น "1/1"
            const selectStd = document.getElementById(`${prefix}-student`);
            
            if(!room) {
                selectStd.innerHTML = '<option value="">-- โปรดเลือกห้องก่อน --</option>';
                selectStd.disabled = true;
                return;
            }

            selectStd.innerHTML = '<option value="">กำลังโหลดรายชื่อ...</option>';
            selectStd.disabled = true;

            // ส่งข้อมูลไปหา action "getStudents"
            const res = await fetchAPI({ action: 'getStudents', room: room }, prefix === 'reg' ? 'btn-submit-reg' : 'btn-verify-reset');
            
            if(res.success) {
                let options = '<option value="">-- เลือกชื่อของคุณ --</option>';
                res.data.forEach(std => {
                    options += `<option value="${std.id}">${std.name}</option>`;
                });
                selectStd.innerHTML = options;
                selectStd.disabled = false;
            } else {
                selectStd.innerHTML = '<option value="">ไม่มีข้อมูลห้องนี้ในระบบ</option>';
                alert(res.error);
            }
        }

        // ดึงรหัสนักเรียนมาใส่ช่อง ให้อัตโนมัติ
        function fillStudentId(prefix) {
            const id = document.getElementById(`${prefix}-student`).value;
            if(prefix === 'reg') {
                document.getElementById('reg-id').value = id || "";
            } else {
                document.getElementById('res-id').value = id || "";
            }
        }

        // ---------------------------------------------------------
        // 🚀 4. สมัครใช้งาน
        // ---------------------------------------------------------
        async function submitRegister() {
            const room = document.getElementById('reg-room').value; // เช่น "1/1"
            const id = document.getElementById('reg-student').value;
            const pass = document.getElementById('reg-pass').value;
            const rec = document.getElementById('reg-recovery').value;

            if(!room || !id) return alert("กรุณาเลือกห้องและชื่อนักเรียน");
            if(pass.length !== 5) return alert("❌ รหัสผ่านต้องเป็นตัวเลข 5 หลักเท่านั้น");
            if(rec.length !== 8) return alert("❌ รหัสกันลืม ต้องเป็นวันเดือนปีเกิด 8 หลัก (เช่น 30052537)");

            const payload = { action: 'register', room: 'ม.' + room, id: id, password: pass, recovery: rec };
            const res = await fetchAPI(payload, 'btn-submit-reg');

            if(res.success) {
                alert("✅ " + res.message);
                document.getElementById('reg-pass').value = '';
                document.getElementById('reg-recovery').value = '';
            } else {
                alert("⚠️ " + res.error);
            }
        }

        // ---------------------------------------------------------
        // 🚀 5. ลืมรหัสผ่าน (ตรวจวันเกิด และ ตั้งใหม่)
        // ---------------------------------------------------------
        async function verifyRecovery() {
            const id = document.getElementById('res-id').value;
            const rec = document.getElementById('res-recovery').value;

            if(!id) return alert("กรุณาเลือกชื่อนักเรียน");
            if(!rec) return alert("กรุณากรอกรหัสกันลืม (วันเดือนปีเกิด)");

            const payload = { action: 'verifyReset', id: id, recovery: rec };
            const res = await fetchAPI(payload, 'btn-verify-reset');

            if(res.success) {
                document.getElementById('step-verify').style.display = 'none';
                document.getElementById('step-new-pass').style.display = 'block';
            } else {
                alert("❌ " + res.error);
            }
        }

        async function updatePassword() {
            const id = document.getElementById('res-id').value;
            const newP = document.getElementById('res-new-pass').value;
            const confP = document.getElementById('res-confirm-pass').value;

            if(newP.length !== 5) return alert("❌ รหัสผ่านใหม่ต้องเป็นตัวเลข 5 หลัก");
            if(newP !== confP) return alert("❌ ยืนยันรหัสผ่านไม่ตรงกัน โปรดพิมพ์ให้เหมือนกันทั้ง 2 ช่อง");

            const payload = { action: 'updatePassword', id: id, newPassword: newP };
            const res = await fetchAPI(payload, 'btn-update-pass');

            if(res.success) {
                alert("✅ " + res.message + "\nกรุณาใช้รหัสใหม่นี้ในการเข้าสู่ระบบครับ");
                switchMode('register'); 
            } else {
                alert("⚠️ " + res.error);
            }
        }
    </script>
</body>
</html>
