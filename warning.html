<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบตักเตือน - โรงเรียนบัวใหญ่</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; color: #1e293b; overflow-x: hidden; }
    
    /* Header & Theme */
    .header-box { background: linear-gradient(135deg, #ef4444, #b91c1c); color: white; padding: 25px 20px 20px; border-radius: 0 0 25px 25px; text-align: center; box-shadow: 0 4px 15px rgba(220, 38, 38, 0.3); position: relative; z-index: 1000; }
    .org-logo { width: 80px; height: 80px; object-fit: cover; border-radius: 50%; border: 3px solid rgba(255, 255, 255, 0.9); box-shadow: 0 4px 10px rgba(0,0,0,0.15); background-color: white; margin-bottom: 5px; }
    
    /* Hamburger Menu */
    .hamburger-btn { position: absolute; top: 20px; left: 20px; background: transparent; border: none; color: white; font-size: 2rem; cursor: pointer; display: none; }
    .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100vh; background: #1e293b; color: white; z-index: 1050; transition: 0.3s; box-shadow: 4px 0 15px rgba(0,0,0,0.2); }
    .sidebar.active { left: 0; }
    .sidebar-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1040; display: none; }
    .sidebar-overlay.active { display: block; }
    .nav-menu { list-style: none; padding: 15px; margin: 0; }
    .nav-menu li { padding: 12px 15px; margin-bottom: 8px; border-radius: 12px; cursor: pointer; color: #cbd5e1; font-weight: 600; transition: 0.2s; }
    .nav-menu li:hover, .nav-menu li.active { background: #ef4444; color: white; }
    
    /* Cards & Containers */
    .content-container { background: white; border-radius: 20px; padding: 25px 20px; margin-top: -20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); position: relative; z-index: 10; margin-bottom: 30px; }
    .view-section { display: none; animation: fadeIn 0.4s ease; }
    .view-section.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* Student Profile & Image */
    .student-avatar { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 4px solid #f8fafc; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 10px; }
    
    /* Warning Categories (Accordion style) */
    .category-card { border: 1px solid #e2e8f0; border-radius: 12px; margin-bottom: 10px; overflow: hidden; transition: 0.3s; }
    .category-header { padding: 15px; background: #f8fafc; cursor: pointer; font-weight: 600; display: flex; justify-content: space-between; align-items: center; color: #334155; }
    .category-header.selected { background: #fee2e2; border-color: #ef4444; color: #b91c1c; }
    .category-body { display: none; padding: 15px; border-top: 1px solid #e2e8f0; background: white; }
    
    .form-control, .form-select { border-radius: 12px; }
    .btn-custom-red { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; border: none; }
    
    /* External Content Box */
    #external-announcement { background: #fffbeb; border: 1px dashed #f59e0b; padding: 15px; border-radius: 15px; margin-bottom: 20px; font-size: 0.9rem; }
    
    .history-group-title { background: #1e293b; color: white; padding: 5px 15px; border-radius: 20px; display: inline-block; font-size: 0.85rem; margin-top: 15px; margin-bottom: 10px; }
    .history-card { border-left: 4px solid #ef4444; background: #f8fafc; padding: 12px 15px; border-radius: 8px; margin-bottom: 8px; font-size: 0.9rem; }
  </style>
</head>
<body>

  <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
  <div class="sidebar" id="main-sidebar">
      <div class="p-4 text-center border-bottom border-secondary">
          <img src="https://drive.google.com/thumbnail?id=15qRbrNRtzKrqwii83OBc8AtVywopEMlj&sz=w200" width="70" class="rounded-circle mb-2 border border-2 border-white">
          <h6 class="fw-bold mb-0">ระบบตักเตือน</h6>
          <small class="text-warning" id="sidebar-admin-name">กรุณาเข้าสู่ระบบ</small>
      </div>
      <ul class="nav-menu">
          <li id="nav-record" class="active" onclick="switchView('record')"><i class="bi bi-pencil-square me-2"></i> 1. บันทึกตักเตือน</li>
          <li id="nav-search" onclick="switchView('search')"><i class="bi bi-search me-2"></i> 2. ค้นหาประวัติ</li>
          <li onclick="logout()"><i class="bi bi-box-arrow-left me-2"></i> 3. ออกจากระบบ</li>
      </ul>
  </div>

  <div class="header-box">
    <button class="hamburger-btn" id="hamburger-btn" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
    <img src="https://drive.google.com/thumbnail?id=15qRbrNRtzKrqwii83OBc8AtVywopEMlj&sz=w300-h300" alt="โลโก้โรงเรียนบัวใหญ่" class="org-logo">
    <h4 class="fw-bold mt-2 mb-1">ระบบตักเตือนนักเรียน</h4>
    <p class="small mb-1" style="color: rgba(255,255,255,0.9);">โรงเรียนบัวใหญ่</p>
  </div>

  <div class="container">
    
    <div id="login-section" class="content-container text-center">
        <h5 class="fw-bold text-dark mb-4"><i class="bi bi-shield-lock text-danger"></i> เข้าสู่ระบบบุคลากร</h5>
        <div class="mb-3 text-start">
            <label class="form-label small fw-bold text-muted">ชื่อผู้ใช้งาน (Username)</label>
            <input type="text" id="loginUser" class="form-control text-center" placeholder="ระบุชื่อผู้ใช้งาน">
        </div>
        <div class="mb-4 text-start">
            <label class="form-label small fw-bold text-muted">รหัสผ่าน (Password)</label>
            <input type="password" id="loginPass" class="form-control text-center" placeholder="ระบุรหัสผ่าน">
        </div>
        <button id="btn-login" class="btn btn-custom-red w-100 rounded-pill py-3 fw-bold shadow-sm" onclick="doLogin()">
            เข้าสู่ระบบ
        </button>
    </div>

    <div id="view-record" class="content-container view-section">
        
        <div id="external-announcement">
            <div class="text-center text-muted spinner-border spinner-border-sm"></div> กำลังโหลดประกาศ...
        </div>

        <h6 class="fw-bold text-danger border-bottom pb-2 mb-3"><i class="bi bi-search"></i> ค้นหานักเรียน</h6>
        
        <div class="row g-2 mb-3">
            <div class="col-6">
                <select id="searchGrade" class="form-select border-danger text-danger fw-bold">
                    <option value="" disabled selected>เลือกระดับชั้น</option>
                    <option value="ม.1">ม.1</option>
                    <option value="ม.2">ม.2</option>
                    <option value="ม.3">ม.3</option>
                    <option value="ม.4">ม.4</option>
                    <option value="ม.5">ม.5</option>
                    <option value="ม.6">ม.6</option>
                </select>
            </div>
            <div class="col-6">
                <select id="searchRoom" class="form-select border-danger text-danger fw-bold">
                    <option value="" disabled selected>เลือกห้อง</option>
                    <option value="1">1</option><option value="2">2</option><option value="3">3</option>
                    <option value="4">4</option><option value="5">5</option><option value="6">6</option>
                    <option value="7">7</option><option value="8">8</option><option value="9">9</option>
                    <option value="10">10</option>
                </select>
            </div>
        </div>

        <div class="input-group mb-4 shadow-sm">
            <input type="number" id="searchId" class="form-control border-danger" placeholder="ระบุรหัส 5 หลัก..." style="border-radius: 12px 0 0 12px;">
            <button class="btn btn-danger px-4" onclick="searchStudent()" id="btn-search" style="border-radius: 0 12px 12px 0;"><i class="bi bi-search"></i></button>
        </div>

        <div id="student-form-box" style="display: none;">
            
            <div class="text-center mb-4 pb-3 border-bottom">
                <div id="profile-img-box"></div>
                <h5 class="fw-bold text-primary mt-2 mb-1" id="res-name">-</h5>
                <span class="badge bg-secondary rounded-pill" id="res-class">-</span>
            </div>

            <h6 class="fw-bold text-danger mb-3"><i class="bi bi-exclamation-triangle"></i> เลือกประเด็นการตักเตือน</h6>
            
            <div id="warning-categories-container"></div>

            <button id="btn-submit" class="btn btn-custom-red w-100 rounded-pill py-3 fw-bold shadow mt-4" onclick="submitWarning()" disabled>
                <i class="bi bi-save"></i> บันทึกการตักเตือน
            </button>

        </div>
    </div>

    <div id="view-search" class="content-container view-section">
        <h5 class="fw-bold text-dark border-bottom pb-2 mb-3"><i class="bi bi-clock-history text-danger"></i> ประวัติการตักเตือนของฉัน</h5>
        <div class="text-center mb-3">
            <button class="btn btn-outline-dark btn-sm rounded-pill px-4" onclick="loadHistory()"><i class="bi bi-arrow-clockwise"></i> โหลดข้อมูลล่าสุด</button>
        </div>
        <div id="history-container">
            <div class="text-center text-muted py-4">กดปุ่มโหลดข้อมูลเพื่อดูประวัติ</div>
        </div>
    </div>

  </div>

  <div class="modal fade" id="customModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content" style="border-radius: 20px;">
        <div class="modal-body text-center p-4">
          <div id="modalIcon" style="font-size: 3rem; margin-bottom: 10px;"></div>
          <h5 id="modalTitle" class="fw-bold mb-2">แจ้งเตือน</h5>
          <p id="modalMessage" class="text-muted mb-4"></p>
          <button class="btn btn-secondary w-100 rounded-pill" data-bs-dismiss="modal">ตกลง (OK)</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // ==========================================
    // ⚠️ ใส่ URL Web App ฝั่งตักเตือน อันใหม่ล่าสุด ตรงนี้ ⚠️
    // ==========================================
    const API_URL = "https://script.google.com/macros/s/AKfycbz3SrI_AiWF-4cQwYmMpuQpBoCj6OBxEaV-hJKY99_uWqIvfsTNawIWE3u1Z-7uMIKkEA/exec"; 

    let currentAdmin = null;
    let currentStudent = null;
    let selectedMainCategory = null;
    let selectedSubCategory = null;

    // 🌟 ข้อมูลหมวดหมู่การตักเตือนทั้ง 6 ประเด็น
    const warningData = [
        { 
          id: 1, title: "1. พฤติกรรม", 
          desc: "พฤติกรรมที่ทำเป็นประจำก่อให้เกิดความไม่สบายใจ ไม่สบายกาย ทรัพย์สินเสียหาย", 
          subs: ["บูลลี่", "รังแก", "กลั่นแกล้ง"] 
        },
        { 
          id: 2, title: "2. ภาพลักษณ์", 
          desc: "ภาพลักษณ์ที่สามารถมองเห็นได้ ไม่เหมาะสมกับความเป็นนักเรียน", 
          subs: ["ทรงผม", "การแต่งหน้า", "เล็บ", "เสื้อ", "กางเกง/กระโปรง", "ถุงเท้า/รองเท้า/เข็มขัด", "กระเป๋า", "อื่น ๆ"] 
        },
        { 
          id: 3, title: "3. การใช้พื้นที่ส่วนรวม", 
          desc: "ความเป็นระเบียบ สะอาด เรียบร้อย", 
          subs: ["ทิ้งขยะ", "ใช้แล้วไม่เก็บ", "ฝ่าฝืนกฏการใช้พื้นที่", "อื่น ๆ"] 
        },
        { 
          id: 4, title: "4. มารยาท", 
          desc: "การแสดงออกพฤติกรรมที่เป็นที่ยอมรับของสังคม", 
          subs: ["เสียงดัง", "คำหยาบ สองแง่สองง่าม ลามก", "ก้าวร้าว"] 
        },
        { 
          id: 5, title: "5. การเข้าเรียน", 
          desc: "พฤติกรรมการเข้าชั้นเรียนและการส่งงาน", 
          subs: ["เข้าเรียนสาย", "โดดเรียน", "ไม่ส่งงานตามกำหนด", "หลับในห้องเรียน"] 
        },
        { 
          id: 6, title: "6. อื่น ๆ (ระบุเอง)", 
          desc: "ประเด็นอื่นๆ ที่ไม่เข้าข่ายหมวดหมู่ด้านบน", 
          subs: ["ระบุเหตุผลอื่นๆ"] 
        }
    ];

    // --- UI ควบคุม ---
    const customModal = new bootstrap.Modal(document.getElementById('customModal'));
    function showModal(title, msg, type='warning') {
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalMessage').innerHTML = msg;
        const icon = document.getElementById('modalIcon');
        if(type==='warning') icon.innerHTML = '<i class="bi bi-exclamation-triangle-fill text-warning"></i>';
        else if(type==='error') icon.innerHTML = '<i class="bi bi-x-circle-fill text-danger"></i>';
        else if(type==='success') icon.innerHTML = '<i class="bi bi-check-circle-fill text-success"></i>';
        customModal.show();
    }

    function toggleSidebar() {
        document.getElementById('main-sidebar').classList.toggle('active');
        document.getElementById('sidebar-overlay').classList.toggle('active');
    }

    function switchView(viewId) {
        document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
        document.getElementById('view-' + viewId).classList.add('active');
        document.querySelectorAll('.nav-menu li').forEach(el => el.classList.remove('active'));
        document.getElementById('nav-' + viewId).classList.add('active');
        toggleSidebar();
        if(viewId === 'search') loadHistory();
    }

    // --- ดึงประกาศภายนอก ---
    async function loadAnnouncement() {
        try {
            const response = await fetch('content_warning.html');
            if(response.ok) {
                const text = await response.text();
                document.getElementById('external-announcement').innerHTML = text;
            } else {
                document.getElementById('external-announcement').style.display = 'none';
            }
        } catch(e) {
            document.getElementById('external-announcement').style.display = 'none';
        }
    }

    // --- สร้างแบบฟอร์มประเด็น ---
    function renderWarningCategories() {
        const container = document.getElementById('warning-categories-container');
        container.innerHTML = "";
        
        warningData.forEach((cat, index) => {
            let subHtml = cat.subs.map((sub, sIdx) => `
                <div class="form-check mb-2">
                    <input class="form-check-input" type="radio" name="subCat" id="sub_${cat.id}_${sIdx}" value="${sub}" onchange="selectSubCategory('${cat.title}', '${sub}')">
                    <label class="form-check-label" for="sub_${cat.id}_${sIdx}">${sub}</label>
                </div>
            `).join('');
            
            if (cat.subs.some(s => s.includes('อื่น') || s.includes('ระบุ'))) {
                subHtml += `<input type="text" id="other_text_${cat.id}" class="form-control form-control-sm mt-2 d-none" placeholder="โปรดระบุรายละเอียด...">`;
            }

            container.innerHTML += `
                <div class="category-card" id="card_${cat.id}">
                    <div class="category-header" onclick="toggleCategory(${cat.id}, '${cat.title}')">
                        <div>${cat.title} 
                            <i class="bi bi-info-circle-fill text-muted ms-1" style="font-size:0.85rem;" onclick="event.stopPropagation(); alert('${cat.desc}')"></i>
                        </div>
                        <i class="bi bi-chevron-down" id="icon_${cat.id}"></i>
                    </div>
                    <div class="category-body" id="body_${cat.id}">
                        <div class="small text-muted mb-2">${cat.desc}</div>
                        ${subHtml}
                    </div>
                </div>
            `;
        });
    }

    function toggleCategory(id, title) {
        warningData.forEach(cat => {
            document.getElementById(`body_${cat.id}`).style.display = 'none';
            document.getElementById(`card_${cat.id}`).querySelector('.category-header').classList.remove('selected');
            document.getElementById(`icon_${cat.id}`).classList.replace('bi-chevron-up', 'bi-chevron-down');
        });
        
        document.querySelectorAll('input[name="subCat"]').forEach(r => r.checked = false);
        selectedMainCategory = title;
        selectedSubCategory = null;
        document.getElementById('btn-submit').disabled = true;

        document.getElementById(`body_${id}`).style.display = 'block';
        document.getElementById(`card_${id}`).querySelector('.category-header').classList.add('selected');
        document.getElementById(`icon_${id}`).classList.replace('bi-chevron-down', 'bi-chevron-up');
    }

    function selectSubCategory(main, sub) {
        selectedMainCategory = main;
        selectedSubCategory = sub;
        document.getElementById('btn-submit').disabled = false;
        
        warningData.forEach(cat => {
            let otherInput = document.getElementById(`other_text_${cat.id}`);
            if(otherInput) {
                if(cat.title === main && (sub.includes('อื่น') || sub.includes('ระบุ'))) {
                    otherInput.classList.remove('d-none');
                } else {
                    otherInput.classList.add('d-none');
                }
            }
        });
    }

    // --- เข้าสู่ระบบ ---
    async function doLogin() {
        const u = document.getElementById('loginUser').value.trim();
        const p = document.getElementById('loginPass').value.trim();
        if(!u || !p) return showModal("ข้อมูลไม่ครบ", "กรุณาระบุ Username และ Password", "warning");

        const btn = document.getElementById('btn-login');
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> กำลังตรวจสอบ...'; btn.disabled = true;

        try {
            const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "adminLogin", username: u, password: p, device: "Mobile/Web" }) }).then(r=>r.json());
            if(res.success) {
                currentAdmin = res.adminName;
                document.getElementById('sidebar-admin-name').innerText = "ครูผู้บันทึก: " + currentAdmin;
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('hamburger-btn').style.display = 'block';
                
                renderWarningCategories(); 
                loadAnnouncement(); 
                switchView('record');
            } else {
                showModal("ล้มเหลว", res.error, "error");
            }
        } catch(e) {
            showModal("ข้อผิดพลาด", "เชื่อมต่อเซิร์ฟเวอร์ไม่ได้", "error");
        }
        btn.innerHTML = 'เข้าสู่ระบบ'; btn.disabled = false;
    }

    function logout() {
        currentAdmin = null;
        document.getElementById('login-section').style.display = 'block';
        document.getElementById('view-record').classList.remove('active');
        document.getElementById('view-search').classList.remove('active');
        document.getElementById('hamburger-btn').style.display = 'none';
        toggleSidebar();
    }

    // --- 🌟 ค้นหานักเรียน (ส่งค่า ชั้น และ ห้อง ไปด้วย) ---
    async function searchStudent() {
        const grade = document.getElementById('searchGrade').value;
        const room = document.getElementById('searchRoom').value;
        const id = document.getElementById('searchId').value.trim();
        
        if(!grade || !room) return showModal("ลืมเลือกชั้นเรียน", "กรุณาเลือกระดับชั้นและห้องก่อนกดค้นหาครับ", "warning");
        if(!id) return showModal("ข้อมูลไม่ครบ", "กรุณาระบุรหัสนักเรียน 5 หลักครับ", "warning");
        
        const btn = document.getElementById('btn-search');
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>'; btn.disabled = true;

        try {
            const payload = { action: "searchStudent", studentId: id, grade: grade, room: room };
            const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) }).then(r=>r.json());
            
            if(res.success) {
                currentStudent = { id: id, name: res.name, room: res.room };
                
                const imgBox = document.getElementById('profile-img-box');
                if (res.imageUrl && res.imageUrl !== "") {
                    let fileId = res.imageUrl.match(/\/d\/([a-zA-Z0-9_-]+)/) ? res.imageUrl.match(/\/d\/([a-zA-Z0-9_-]+)/)[1] : (res.imageUrl.includes('id=') ? new URLSearchParams(res.imageUrl.substring(res.imageUrl.indexOf('?'))).get('id') : "");
                    imgBox.innerHTML = fileId ? `<img src="https://drive.google.com/thumbnail?id=${fileId}&sz=w300-h300" class="student-avatar">` : `<i class="bi bi-person-circle text-muted" style="font-size: 6rem;"></i>`;
                } else { imgBox.innerHTML = `<i class="bi bi-person-circle text-muted" style="font-size: 6rem;"></i>`; }

                document.getElementById('res-name').innerText = res.name;
                document.getElementById('res-class').innerText = "รหัส: " + id + " | ชั้น " + res.room;
                
                renderWarningCategories(); 
                document.getElementById('btn-submit').disabled = true;
                document.getElementById('student-form-box').style.display = 'block';
            } else {
                showModal("ไม่พบข้อมูล", res.error, "error");
                document.getElementById('student-form-box').style.display = 'none';
            }
        } catch(e) {
            showModal("ข้อผิดพลาด", "ค้นหาล้มเหลว", "error");
        }
        btn.innerHTML = '<i class="bi bi-search"></i>'; btn.disabled = false;
    }

    // --- บันทึกตักเตือน ---
    async function submitWarning() {
        if(!currentStudent || !selectedMainCategory || !selectedSubCategory) return;
        
        let otherText = "";
        let activeCatId = warningData.find(c => c.title === selectedMainCategory).id;
        let otherInput = document.getElementById(`other_text_${activeCatId}`);
        
        if (otherInput && !otherInput.classList.contains('d-none')) {
            otherText = otherInput.value.trim();
            if(!otherText) return showModal("ข้อมูลไม่ครบ", "กรุณาระบุรายละเอียดเพิ่มเติมในช่องด้วยครับ", "warning");
        }

        const btn = document.getElementById('btn-submit');
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> กำลังบันทึก...'; btn.disabled = true;

        const payload = {
            action: "saveWarning",
            data: {
                studentId: currentStudent.id,
                room: currentStudent.room,
                adminName: currentAdmin,
                mainCategory: selectedMainCategory,
                subCategory: selectedSubCategory,
                otherDetail: otherText
            }
        };

        try {
            const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) }).then(r=>r.json());
            if(res.success) {
                showModal("บันทึกสำเร็จ!", `ได้ตักเตือน ${currentStudent.name} และบันทึกไว้ในระบบ E-point คะแนนพฤติกรรมแล้ว`, "success");
                document.getElementById('student-form-box').style.display = 'none';
                document.getElementById('searchId').value = "";
            } else {
                showModal("ผิดพลาด", res.error, "error");
            }
        } catch(e) {
            showModal("ข้อผิดพลาด", "บันทึกล้มเหลว", "error");
        }
        btn.innerHTML = '<i class="bi bi-save"></i> บันทึกการตักเตือน'; btn.disabled = false;
    }

    // --- ค้นหาประวัติ ---
    async function loadHistory() {
        if(!currentAdmin) return;
        const container = document.getElementById('history-container');
        container.innerHTML = '<div class="text-center mt-4"><span class="spinner-border text-danger"></span></div>';

        try {
            const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "getHistory", adminName: currentAdmin }) }).then(r=>r.json());
            if(res.success && res.data.length > 0) {
                
                let grouped = {};
                res.data.forEach(item => {
                    let c = item.room || "ไม่ระบุชั้น";
                    if(!grouped[c]) grouped[c] = [];
                    grouped[c].push(item);
                });

                let html = "";
                for(let cls in grouped) {
                    html += `<div class="history-group-title"><i class="bi bi-people-fill"></i> ชั้น ${cls} (${grouped[cls].length} รายการ)</div>`;
                    grouped[cls].forEach(log => {
                        html += `
                        <div class="history-card shadow-sm">
                            <div class="d-flex justify-content-between align-items-center mb-1">
                                <span class="badge bg-danger">รหัส ${log.studentId}</span>
                                <small class="text-muted"><i class="bi bi-clock"></i> ${log.date.split(' ')[0]}</small>
                            </div>
                            <div class="fw-bold text-dark">${log.issue}</div>
                        </div>`;
                    });
                }
                container.innerHTML = html;

            } else {
                container.innerHTML = '<div class="text-center text-muted py-4">ยังไม่มีประวัติการตักเตือน</div>';
            }
        } catch(e) {
            container.innerHTML = '<div class="text-center text-danger py-4">โหลดประวัติล้มเหลว</div>';
        }
    }
  </script>
</body>
</html>
